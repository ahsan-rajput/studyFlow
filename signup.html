<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sign Up | StudyFlow</title>
  <meta name="description" content="Create a StudyFlow account to start organizing your courses, tasks, notes, deadlines, and academic goals.">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main id="main-content" class="auth-page">
    <section class="auth-card" aria-labelledby="signup-title">
      <div class="auth-header">
        <a class="brand" href="index.html" aria-label="StudyFlow home">
          <span class="brand-mark">SF</span>
          <span>StudyFlow</span>
        </a>

        <div class="stack-sm">
          <h1 id="signup-title" class="auth-title">Create your account</h1>
          <p class="auth-description">
            Set up your academic workspace and start organizing your semester.
          </p>
        </div>
      </div>

      <form class="auth-form" action="#" method="post">
        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <input
            class="form-input"
            type="text"
            id="name"
            name="name"
            placeholder="Your full name"
            autocomplete="name"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Create a password"
            autocomplete="new-password"
            required
          >
          <p class="form-hint">Use a password you do not use on other websites.</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm password</label>
          <input
            class="form-input"
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="Re-enter your password"
            autocomplete="new-password"
            required
          >
        </div>

        <button class="btn btn-primary btn-block" type="submit">
          Create account
        </button>
      </form>

      <p class="auth-form-footer">
        Already have an account?
        <a href="login.html">Log in</a>
      </p>

      <p class="auth-meta">
        Static prototype only. Account creation will become functional in a later phase.
      </p>
    </section>
  </main>
</body>
</html>
