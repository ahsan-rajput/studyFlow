<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Forgot Password | StudyFlow</title>
  <meta name="description" content="Reset your StudyFlow password and regain access to your academic dashboard.">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main id="main-content" class="auth-page">
    <section class="auth-card" aria-labelledby="reset-title">
      <div class="auth-header">
        <a class="brand" href="index.html" aria-label="StudyFlow home">
          <span class="brand-mark">SF</span>
          <span>StudyFlow</span>
        </a>

        <div class="stack-sm">
          <h1 id="reset-title" class="auth-title">Reset your password</h1>
          <p class="auth-description">
            Enter your email address and we will prepare the password reset flow in a later phase.
          </p>
        </div>
      </div>

      <form class="auth-form" action="#" method="post">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <button class="btn btn-primary btn-block" type="submit">
          Request password reset
        </button>
      </form>

      <p class="auth-form-footer">
        Remembered your password?
        <a href="login.html">Back to log in</a>
      </p>

      <p class="auth-meta">
        Static prototype only. Real password reset will be added with backend authentication later.
      </p>
    </section>
  </main>
</body>
</html>
