<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Log In | StudyFlow</title>
  <meta name="description" content="Log in to StudyFlow to access your courses, tasks, notes, deadlines, and academic dashboard.">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main id="main-content" class="auth-page">
    <section class="auth-card" aria-labelledby="login-title">
      <div class="auth-header">
        <a class="brand" href="index.html" aria-label="StudyFlow home">
          <span class="brand-mark">SF</span>
          <span>StudyFlow</span>
        </a>

        <div class="stack-sm">
          <h1 id="login-title" class="auth-title">Welcome back</h1>
          <p class="auth-description">
            Log in to continue managing your academic workspace.
          </p>
        </div>
      </div>

      <form class="auth-form" action="#" method="post">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <div class="form-actions-between">
            <label class="form-label" for="password">Password</label>
            <a href="forgot-password.html">Forgot password?</a>
          </div>

          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
        </div>

        <button class="btn btn-primary btn-block" type="submit">
          Log in
        </button>
      </form>

      <p class="auth-form-footer">
        New to StudyFlow?
        <a href="signup.html">Create an account</a>
      </p>

      <p class="auth-meta">
        Static prototype only. Real authentication will be added in a later phase.
      </p>
    </section>
  </main>
</body>
</html>
